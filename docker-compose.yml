version: "3.8"

services:
  db:
    image: mysql:8.0
    volumes:
      - sakila-db-data:/var/lib/mysql
    networks:
      - sakila-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    build: .
    container_name: sakila-app-compose
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
    networks:
      - sakila-network

  db-admin:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - sakila-network

  test-runner:
    build: .
    command: python -m pytest tests/ -v
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - test
    networks:
      - sakila-network

networks:
  sakila-network:
    driver: bridge

volumes:
  sakila-db-data:
