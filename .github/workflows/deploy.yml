name: Deploy Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Print environment info
        run: |
          echo "Deploying to staging..."
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
      - name: Run Docker image with staging tag
        run: |
          docker build -t sakila-app:staging .
          echo "Staging image built successfully"
      - name: Write deployment summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date)" >> $GITHUB_STEP_SUMMARY
      - name: Notify
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Print production deployment info
        run: |
          echo "Deploying to production..."
          echo "Commit: ${{ github.sha }}"
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}.0.0
          release_name: Release v${{ github.run_number }}.0.0
          body: |
            Production deployment from commit ${{ github.sha }}
          draft: false
          prerelease: false
      - name: Notify
        run: echo "Slack notification: Deployment to production successful"